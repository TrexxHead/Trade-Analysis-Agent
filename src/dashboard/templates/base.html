<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Trade Analysis Agent{% endblock %}</title>
<style>
  :root {
    color-scheme: light;
    --surface-1:      #fcfcfb;
    --page:           #f9f9f7;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --muted:          #898781;
    --grid:           #e1e0d9;
    --baseline:       #c3c2b7;
    --border:         rgba(11,11,11,0.10);
    --good:           #0ca30c;
    --critical:       #d03b3b;
    --warning:        #fab219;
    --series-blue:    #2a78d6;
    --series-red:     #e34948;
    --success-text:   #006300;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --surface-1:      #1a1a19;
      --page:           #0d0d0d;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --muted:          #898781;
      --grid:           #2c2c2a;
      --baseline:       #383835;
      --border:         rgba(255,255,255,0.10);
      --good:           #0ca30c;
      --critical:       #e66767;
      --warning:        #fab219;
      --series-blue:    #3987e5;
      --series-red:     #e66767;
      --success-text:   #0ca30c;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--page);
    color: var(--text-primary);
  }
  a { color: inherit; }
  nav {
    display: flex;
    gap: 4px;
    padding: 12px 20px;
    background: var(--surface-1);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  nav a {
    padding: 8px 14px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    white-space: nowrap;
  }
  nav a.active { background: var(--grid); color: var(--text-primary); }
  main { max-width: 1100px; margin: 0 auto; padding: 24px 20px 60px; }
  h1 { font-size: 20px; margin: 0 0 20px; }
  h2 { font-size: 15px; color: var(--text-secondary); font-weight: 600; margin: 32px 0 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td {
    text-align: left;
    padding: 8px 10px;
    border-bottom: 1px solid var(--grid);
    font-variant-numeric: tabular-nums;
  }
  th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.03em; }
  .card {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 8px; }
  .stat-tile { background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
  .stat-tile .label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .stat-tile .value { font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .pos { color: var(--success-text); }
  .neg { color: var(--critical); }
  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 500;
  }
  .pill.good { background: color-mix(in srgb, var(--good) 15%, transparent); color: var(--good); }
  .pill.critical { background: color-mix(in srgb, var(--critical) 15%, transparent); color: var(--critical); }
  .pill.warning { background: color-mix(in srgb, var(--warning) 20%, transparent); color: #8a5a00; }
  .pill.muted { background: var(--grid); color: var(--text-secondary); }
  .empty { color: var(--muted); font-size: 13px; padding: 24px 0; text-align: center; }
  .progress-track { background: var(--grid); border-radius: 999px; height: 10px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 999px; }
  .progress-fill.good { background: var(--good); }
  .progress-fill.warning { background: var(--warning); }
  .progress-fill.critical { background: var(--critical); }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; margin-top: 14px; }
  input[type="text"], input[type="number"], textarea, select {
    width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--page); color: var(--text-primary); font: inherit; font-size: 13px;
  }
  textarea { min-height: 80px; resize: vertical; }
</style>
</head>
<body>
<nav>
  <a href="/" class="{{ 'active' if active == 'index' }}">Overview</a>
  <a href="/calendar" class="{{ 'active' if active == 'calendar' }}">Calendar</a>
  <a href="/trades" class="{{ 'active' if active == 'trades' }}">Trades</a>
  <a href="/mistakes" class="{{ 'active' if active == 'mistakes' }}">Mistakes</a>
  <a href="/insights" class="{{ 'active' if active == 'insights' }}">Insights</a>
  <a href="/backtests" class="{{ 'active' if active == 'backtests' }}">Backtests</a>
  <a href="/proposals" class="{{ 'active' if active == 'proposals' }}">Proposals</a>
</nav>
<main>
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  <div style="margin-bottom:16px; display:flex; flex-direction:column; gap:6px;">
    {% for category, message in messages %}
    <div class="pill {{ category }}" style="width:fit-content;">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}
{% endwith %}
{% block content %}{% endblock %}
</main>
</body>
</html>
